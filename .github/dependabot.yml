version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10
    # Pin sql.js — 1.14.1 breaks jeep-sqlite@2.8.0 WASM ABI (LinkError).
    # Revisit when jeep-sqlite publishes a version compatible with a newer sql.js.
    # Ignore @psych/lib — it's a JSR dep (jsr:^1.24.3), dependabot can't
    # authenticate to npm.jsr.io. Update via `pnpm update @psych/lib` manually.
    ignore:
      - dependency-name: "sql.js"
      - dependency-name: "@psych/lib"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /workspaces/image-extraction
    schedule:
      interval: weekly
    groups:
      image-extraction:
        update-types:
          - minor
          - patch
