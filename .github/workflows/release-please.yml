name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  test-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:release
        env:
          RELEASE_GATING: 1

  release-please:
    runs-on: ubuntu-latest
    needs: test-release
    steps:
      # Only invokes the googleapis/release-please-action.
      # No untrusted input flows into any run: command.
      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.1.3
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
