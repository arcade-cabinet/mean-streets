name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Only invokes the googleapis/release-please-action.
      # No untrusted input flows into any run: command.
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.1.3
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
