<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- The Reaper: Scythe with accumulating damage notches -->
  <!-- Scythe handle -->
  <path d="M48 12 L20 52" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Scythe blade (curved) -->
  <path d="M48 12 Q54 22 46 30 Q36 32 32 22 Q40 12 48 12 Z"
        stroke="#D4A017" stroke-width="2" stroke-linejoin="round"
        fill="#1A1A1A" fill-opacity="0.4"/>
  <!-- Damage notches (the "glancing blow still marks") -->
  <path d="M42 16 L44 18" stroke="#D4A017" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <path d="M44 20 L46 22" stroke="#D4A017" stroke-width="1" stroke-linecap="round" opacity="0.65"/>
  <path d="M40 22 L42 24" stroke="#D4A017" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Grip -->
  <circle cx="22" cy="50" r="2" fill="#D4A017"/>
  <!-- Blood drip (damage accumulates) -->
  <circle cx="34" cy="34" r="1.2" fill="#D4A017" opacity="0.7"/>
  <circle cx="32" cy="38" r="0.8" fill="#D4A017" opacity="0.5"/>
  <circle cx="31" cy="42" r="0.5" fill="#D4A017" opacity="0.3"/>
</svg>
