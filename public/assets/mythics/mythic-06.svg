        fill="#D4A017" fill-opacity="0.2"/>
  <!-- Left axe -->
  <path d="M14 20 L22 46" stroke="#D4A017" stroke-width="2" stroke-linecap="round"/>
  <path d="M10 26 Q12 20 18 22 Q18 28 14 28 Z"
