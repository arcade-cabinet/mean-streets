        fill="#D4A017" fill-opacity="0.15"/>
  <!-- Right axe -->
  <path d="M50 20 L42 46" stroke="#D4A017" stroke-width="2" stroke-linecap="round"/>
  <path d="M54 26 Q52 20 46 22 Q46 28 50 28 Z"
        stroke="#D4A017" stroke-width="1.2" stroke-linejoin="round"
        fill="#D4A017" fill-opacity="0.15"/>
  <!-- Base binding -->
