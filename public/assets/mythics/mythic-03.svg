<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- The Architect: Compass/square geometry with a blueprint flourish -->
  <!-- Compass arcs -->
  <path d="M16 50 L32 14 L48 50"
        stroke="#D4A017" stroke-width="2" stroke-linejoin="round" fill="none"/>
  <!-- Cross member (the "square" rule) -->
  <path d="M22 38 L42 38" stroke="#D4A017" stroke-width="2" stroke-linecap="round"/>
  <!-- Pivot -->
  <circle cx="32" cy="14" r="3" fill="#1A1A1A" stroke="#D4A017" stroke-width="1.5"/>
  <!-- Blueprint grid (sparse) -->
  <line x1="20" y1="50" x2="20" y2="54" stroke="#D4A017" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="50" x2="32" y2="54" stroke="#D4A017" stroke-width="1" opacity="0.5"/>
  <line x1="44" y1="50" x2="44" y2="54" stroke="#D4A017" stroke-width="1" opacity="0.5"/>
  <line x1="16" y1="54" x2="48" y2="54" stroke="#D4A017" stroke-width="1" opacity="0.5"/>
</svg>
