<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- The Ghost: Ethereal silhouette pointing/arrowing at a target behind -->
  <!-- Ghost form -->
  <path d="M20 46 Q20 20 32 14 Q44 20 44 46 L40 50 L36 44 L32 50 L28 44 L24 50 Z"
        stroke="#D4A017" stroke-width="2" stroke-linejoin="round"
        fill="#1A1A1A" fill-opacity="0.4"/>
  <!-- Eyes (hollow) -->
  <circle cx="27" cy="26" r="1.5" fill="#D4A017"/>
  <circle cx="37" cy="26" r="1.5" fill="#D4A017"/>
  <!-- Targeting line past the stack (the retreated card) -->
  <path d="M48 14 L58 14" stroke="#D4A017" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M55 11 L58 14 L55 17" stroke="#D4A017" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
